run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable:
    # Disabled due to pre-existing issues in codebase
    # TODO: Enable and fix these issues incrementally
    - errcheck
  enable:
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
